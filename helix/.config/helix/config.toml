theme = "kanagawa"
# theme = "material_palenight"

[keys.normal]
C-h = "jump_view_left"
C-l = "jump_view_right"
C-k = "jump_view_up"
C-j = "jump_view_down"
"ret" = "goto_word"
C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]
A-w = "move_next_sub_word_start"
A-e = "move_next_sub_word_end"
A-b = "move_prev_sub_word_start"

A-u = "scroll_up"
A-d = "scroll_down"
 
[keys.normal.m.n]
"{" = "@f{mi{"
"(" = "@f(mi("
"\"" = "@f\"lmi\""
"'" = "@f'mi'"

[keys.normal.m.N]
"{" = "@F{mi{"
"(" = "@F(mi("
"\"" = "@F\"mi\""
"'" = "@F'mi'"

[keys.normal.space]
e = "file_explorer_in_current_buffer_directory"
E = "file_explorer"

[keys.normal.space.space]
b = ":sh git blame -L %{cursor_line},%{cursor_line} %{buffer_name}"
r = ":reset-diff-change"
c = ["collapse_selection", "kill_to_line_end", "insert_mode"]
d = ["collapse_selection", "kill_to_line_end"]
s = "@mi(S,<ret><A-;>i<ret><esc>(,<A-;>a,<ret><esc>"
n = ":noop %sh{echo '%{buffer_name}' | pbcopy}"
N = ":noop %sh{echo '%{buffer_name}:%{cursor_line}' | pbcopy}"

g = ":sh echo $(gh repo view --json url --jq '.url')/blob/$(git rev-parse HEAD)/'%{buffer_name}' | pbcopy"
G = ":sh echo $(gh repo view --json url --jq '.url')/blob/$(git rev-parse HEAD)/'%{buffer_name}'#L'%{selection_line_start}'-L'%{selection_line_end}'| pbcopy"

f = [":pipe-to golangci-lint run --enable-only wsl_v5 --fix", ":reload-all", ":lsp-restart"]

[keys.insert]
"C-["= "normal_mode"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
